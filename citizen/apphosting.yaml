# Firebase App Hosting — Citizen Portal (@saarthi/citizen).
# Create the backend with rootDir = "citizen".
runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  # Point the portal at the deployed MP-dashboard/API backend URL.
  # NEXT_PUBLIC_ is baked at build time, so it must be available at BUILD.
  # Replace the value with your app backend's URL after that backend deploys.
  - variable: NEXT_PUBLIC_SAARTHI_API_URL
    value: https://REPLACE-with-app-backend-url.web.app
    availability:
      - BUILD
      - RUNTIME
